<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Smart</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">

    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]'], ['[ ', ' ]'], ['[', ']']],
                processEscapes: true
            },
            options: {
                ignoreHtmlClass: 'tex2jax_ignore',
                processHtmlClass: 'tex2jax_process'
            }
        };

        // UPDATED: This now copies the vocab AND opens Quizlet
        function handleQuizletExport() {
            if (!currentVocab) return alert("No vocabulary found to export.");

            navigator.clipboard.writeText(currentVocab).then(() => {
                // Inform user about the next steps on the Quizlet page
                alert("✅ Vocab copied to clipboard!\n\nInstructions for Quizlet:\n1. Press the '+ Import' button.\n2. Paste (Ctrl+V) into the text box.");
                
                // Open Quizlet in a new tab
                window.open('https://quizlet.com/create-set', '_blank');
            }).catch(err => {
                console.error('Could not copy text: ', err);
                alert("Failed to copy vocab. Please try again.");
            });
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    
    <style>
        @media print {
            #result {
                border-left: 5px solid #1a73e8 !important;
                box-shadow: none !important;
                background: white !important;
            }
        }
        body { background-color: #f0f2f5; font-family: 'Inter', sans-serif; padding: 40px 20px; }
        .container-fluid { max-width: 1200px; }
        .main-card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .study-header { color: #1a73e8; font-weight: 700; margin-bottom: 30px; }
        
        #result { 
            display: none; 
            text-align: left; 
            white-space: pre-wrap;
            background: #ffffff; 
            padding: 30px; 
            border-radius: 12px; 
            border-left: 5px solid #1a73e8;
            margin-top: 30px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.02);
            line-height: 1.6;
        }

        #result h1, #result h2 { color: #1a73e8; border-bottom: 1px solid #eee; padding-bottom: 10px; margin-top: 20px; }
        mjx-container { color: #1a73e8; font-size: 1.1em; margin: 15px 0 !important; display: block; overflow-x: auto; }
        
        .vocab-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .vocab-table th, .vocab-table td { padding: 12px; border: 1px solid #dee2e6; text-align: left; }
        .vocab-table th { background-color: #f8f9fa; color: #1a73e8; font-weight: 700; width: 40%; }
        
        .loading { display: none; margin: 20px 0; font-style: italic; color: #666; }
        .mode-card { border: 1px solid #ddd; border-radius: 10px; padding: 15px; margin-bottom: 20px; transition: 0.3s; cursor: pointer; }
        .mode-card:hover { border-color: #1a73e8; background: #f8fbff; }

        .sidebar { background: #fff; border-radius: 20px; padding: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); height: fit-content; }
        .class-item { cursor: pointer; padding: 10px; border-radius: 8px; margin-bottom: 5px; transition: 0.2s; }
        .class-item:hover { background: #eef4ff; color: #1a73e8; }
        .image-thumb { width: 80px; height: 80px; object-fit: cover; border-radius: 8px; border: 1px solid #ddd; }
        .remove-img { position: absolute; top: -5px; right: -5px; background: red; color: white; border-radius: 50%; width: 20px; height: 20px; font-size: 14px; line-height: 18px; text-align: center; cursor: pointer; font-weight: bold; border: 1px solid white; }
        .draggable-file { cursor: grab; background: #fff; transition: transform 0.1s; }
        .draggable-file:active { cursor: grabbing; }
        .file-list-container { padding-bottom: 10px; }
    </style>
</head>
<body class="text-center">

<div class="container-fluid">
    <div class="row">
        <div class="col-md-3 mb-4">
            <div class="sidebar text-start">
                <h5 class="fw-bold mb-3">📁 My Classes</h5>
                <div id="class-list" class="list-group list-group-flush mb-3"></div>
                <button class="btn btn-outline-primary btn-sm w-100" onclick="createNewClass()">+ New Class</button>
            </div>
        </div>

        <div class="col-md-9">
            <div class="main-card">
                <h1 class="study-header">Study Smart</h1>
                
                <form id="upload-form">
                    <div class="mb-4 text-start">
                        <label class="form-label fw-bold">Step 1: Upload note images</label>
                        <input type="file" id="file-input" class="form-control" multiple>
                    </div>

                    <div id="image-preview-container" class="mb-4 text-start" style="display: none;">
                        <h6 class="text-muted fw-bold">Selected Pages:</h6>
                        <div id="image-gallery" class="d-flex flex-wrap gap-2"></div>
                    </div>

                    <div class="mode-card text-start">
                        <label class="fw-bold mb-2">Step 2: Pick form of notes</label>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="mode" id="modeSummary" value="summary" checked>
                            <label class="form-check-label" for="modeSummary"><strong>📚 Detailed Study Guide</strong></label>
                        </div>
                        <div class="form-check mt-2">
                            <input class="form-check-input" type="radio" name="mode" id="modeVocab" value="vocab_list">
                            <label class="form-check-label" for="modeVocab"><strong>📝 Vocab List</strong> (for Quizlet)</label>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary btn-lg w-100">Create Now</button>
                </form>
                
                <div id="loading" class="loading">
                    <div class="spinner-border spinner-border-sm text-primary" role="status"></div>
                    Processing all images...
                </div>
                
                <div id="result"></div>
                
                <div class="mt-4">
                    <button id="download-btn" class="btn btn-primary btn-lg" style="display:none;" onclick="downloadPDF()">📥 Download PDF</button>
                    <button id="quizlet-btn" class="btn btn-success btn-lg" style="display:none;" onclick="handleQuizletExport()">Quizlet (Import flashcards)</button>
                    
                    <div id="save-section" class="mt-3" style="display:none;">
                        <hr>
                        <p class="text-muted small">Save this result to a class folder:</p>
                        <div class="input-group justify-content-center">
                            <select id="class-select" class="form-select" style="max-width: 200px;"></select>
                            <button class="btn btn-outline-secondary" onclick="saveResultToClass()">💾 Save to Class</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const form = document.getElementById('upload-form');
    const fileInput = document.getElementById('file-input');
    const resultDiv = document.getElementById('result');
    const loading = document.getElementById('loading');
    const downloadBtn = document.getElementById('download-btn');
    const quizletBtn = document.getElementById('quizlet-btn');
    const saveSection = document.getElementById('save-section');
    const gallery = document.getElementById('image-gallery');
    const previewContainer = document.getElementById('image-preview-container');

    let currentVocab = "";
    let currentTitle = "";
    let selectedFiles = [];

    fileInput.onchange = function() {
        const newFiles = Array.from(fileInput.files);
        selectedFiles = selectedFiles.concat(newFiles);
        renderGallery();
        fileInput.value = "";
    };
    
    function renderGallery() {
        gallery.innerHTML = '';
        if (selectedFiles.length > 0) {
            previewContainer.style.display = 'block';
            selectedFiles.forEach((file, index) => {
                const wrapper = document.createElement('div');
                wrapper.className = "position-relative";
                const img = document.createElement('img');
                img.src = URL.createObjectURL(file);
                img.className = "image-thumb shadow-sm";
                const removeBtn = document.createElement('div');
                removeBtn.className = "remove-img";
                removeBtn.innerHTML = "×";
                removeBtn.onclick = () => {
                    selectedFiles.splice(index, 1);
                    renderGallery();
                };
                wrapper.appendChild(img);
                wrapper.appendChild(removeBtn);
                gallery.appendChild(wrapper);
            });
        } else {
            previewContainer.style.display = 'none';
        }
    }

    let myClasses = JSON.parse(localStorage.getItem('study_vault')) || {};
    let activeClassName = null;

    function updateClassUI() {
        const list = document.getElementById('class-list');
        const select = document.getElementById('class-select');
        const openFolders = {};
        document.querySelectorAll('.file-list-container').forEach(el => {
            openFolders[el.dataset.classname] = el.style.display === 'block';
        });

        list.innerHTML = '';
        select.innerHTML = '<option value="">Choose Class...</option>';
        
        Object.keys(myClasses).forEach(className => {
            select.innerHTML += `<option value="${className}">${className}</option>`;
            const folderId = `files-${className.replace(/\s+/g, '-')}`;
            const isPreviouslyOpen = openFolders[className] || false;

            let folderHtml = `
                <div class="mb-2 border rounded p-1">
                    <div class="class-item fw-bold d-flex justify-content-between" onclick="toggleFolder('${className}')">
                        <span>📁 ${className}</span>
                        <span class="badge bg-secondary rounded-pill">${myClasses[className].length}</span>
                    </div>
                    <div id="${folderId}" class="file-list-container" data-classname="${className}" style="display: ${isPreviouslyOpen ? 'block' : 'none'}; min-height: 20px;">
            `;
            
            myClasses[className].forEach((file, index) => {
                folderHtml += `
                    <div class="small text-muted p-2 border-start ms-2 mt-1 class-item draggable-file" data-index="${index}" onclick="viewFile('${className}', ${index})">
                        ⠿ ${file.title}
                    </div>`;
            });
            folderHtml += `</div></div>`;
            list.innerHTML += folderHtml;
        });
        initDraggable();
    }

    function initDraggable() {
        const containers = document.querySelectorAll('.file-list-container');
        containers.forEach(container => {
            new Sortable(container, {
                group: 'shared', 
                animation: 150,
                ghostClass: 'bg-light',
                onEnd: function (evt) {
                    const fromClass = evt.from.dataset.classname;
                    const toClass = evt.to.dataset.classname;
                    const oldIndex = evt.oldIndex;
                    const newIndex = evt.newIndex;
                    const movedFile = myClasses[fromClass].splice(oldIndex, 1)[0];
                    myClasses[toClass].splice(newIndex, 0, movedFile);
                    localStorage.setItem('study_vault', JSON.stringify(myClasses));
                    updateClassUI();
                },
            });
        });
    }

    function toggleFolder(className) {
        const folderId = `files-${className.replace(/\s+/g, '-')}`;
        const folderElement = document.getElementById(folderId);
        if (folderElement) {
            folderElement.style.display = folderElement.style.display === 'none' ? 'block' : 'none';
        }
    }

    function viewFile(className, fileIndex) {
        const file = myClasses[className][fileIndex];
        currentTitle = file.title;
        if (file.type === 'vocab') {
            currentVocab = file.vocabData;
            quizletBtn.style.display = 'inline-block';
        } else {
            quizletBtn.style.display = 'none';
        }
        resultDiv.innerHTML = `
            <div class="alert alert-info d-flex justify-content-between align-items-center py-2">
                <span>Viewing: <strong>${file.title}</strong> (${className})</span>
                <div class="btn-group">
                    <button class="btn btn-sm btn-outline-info" onclick="renameFile('${className}', ${fileIndex})">✏️ Rename</button>
                    <button class="btn btn-sm btn-outline-info" onclick="deleteFile('${className}', ${fileIndex})">🗑️ Delete</button>
                </div>
            </div>
            ${file.content}
        `;
        resultDiv.style.display = 'block';
        downloadBtn.style.display = 'inline-block';
    }

    function deleteFile(className, fileIndex) {
        if (confirm("Delete this file permanently?")) {
            myClasses[className].splice(fileIndex, 1);
            localStorage.setItem('study_vault', JSON.stringify(myClasses));
            updateClassUI();
            resultDiv.style.display = 'none';
            downloadBtn.style.display = 'none';
            quizletBtn.style.display = 'none';
        }
    }

    function renameFile(className, fileIndex) {
        const oldName = myClasses[className][fileIndex].title;
        const newName = prompt("Rename this file:", oldName);
        if (newName && newName !== oldName) {
            myClasses[className][fileIndex].title = newName;
            localStorage.setItem('study_vault', JSON.stringify(myClasses));
            updateClassUI();
            viewFile(className, fileIndex);
        }
    }

    function createNewClass() {
        const name = prompt("Enter Class Name:");
        if (name && !myClasses[name]) {
            myClasses[name] = [];
            localStorage.setItem('study_vault', JSON.stringify(myClasses));
            updateClassUI();
        }
    }

    function saveResultToClass() {
        const className = document.getElementById('class-select').value;
        if (!className) return alert("Select a class first!");
        const fileName = prompt("Name this file:", currentTitle || "Untitled Note");
        if (!fileName) return; 
        const isVocab = (quizletBtn.style.display === 'inline-block');
        const noteEntry = {
            title: fileName,
            content: resultDiv.innerHTML,
            type: isVocab ? 'vocab' : 'summary',
            vocabData: isVocab ? currentVocab : null,
            date: new Date().toLocaleDateString()
        };
        myClasses[className].push(noteEntry);
        localStorage.setItem('study_vault', JSON.stringify(myClasses));
        updateClassUI();
        alert(`Saved to ${className}`);
    }

    form.onsubmit = async (e) => {
        e.preventDefault();
        if (selectedFiles.length === 0) return alert("Please select images first.");
        
        resultDiv.style.display = 'none';
        downloadBtn.style.display = 'none';
        quizletBtn.style.display = 'none';
        saveSection.style.display = 'none';
        loading.style.display = 'block';

        const formData = new FormData();
        const selectedMode = document.querySelector('input[name="mode"]:checked').value;
        formData.append('mode', selectedMode);
        selectedFiles.forEach(file => formData.append('image', file));

        try {
            const response = await fetch('/analyze', { method: 'POST', body: formData });
            const data = await response.json();

            if (data.error) {
                resultDiv.innerHTML = `<div class="alert alert-danger">Error: ${data.error}</div>`;
                resultDiv.style.display = 'block';
            } else {
                if (selectedMode === 'vocab_list') {
                    currentVocab = data.vocab;
                    currentTitle = data.title || "Vocab List";
                    
                    // REMOVED: Individual Copy Button from the UI here
                    let tableContent = `
                        <div class="mb-3">
                            <h2>${currentTitle}</h2>
                        </div>
                        <table class="vocab-table"><thead><tr><th>Term</th><th>Definition</th></tr></thead><tbody>`;
                    
                    const lines = data.vocab.trim().split('\n');
                    lines.forEach(line => {
                        if (!line.trim()) return;
                        let parts = line.split('\t');
                        if (parts.length < 2) parts = line.split(' - ');
                        if (parts.length < 2) parts = line.split(': ');

                        if (parts.length >= 2) {
                            tableContent += `<tr><td><strong>${parts[0].trim()}</strong></td><td>${parts.slice(1).join(': ').trim()}</td></tr>`;
                        }
                    });
                    tableContent += `</tbody></table>`;
                    resultDiv.innerHTML = tableContent;
                    quizletBtn.style.display = 'inline-block';
                } else {
                    currentTitle = "Study Guide";
                    let formattedContent = data.result.replace(/\\\[/g, '$$$$').replace(/\\\]/g, '$$$$').replace(/\\\(/g, '$').replace(/\\\)/g, '$');
                    resultDiv.innerHTML = marked.parse(formattedContent);
                }
                resultDiv.style.display = 'block';
                downloadBtn.style.display = 'inline-block';
                saveSection.style.display = 'block';
                if (window.MathJax) MathJax.typesetPromise([resultDiv]);
            }
        } catch (err) {
            resultDiv.innerHTML = `<div class="alert alert-danger">Connection failed.</div>`;
            resultDiv.style.display = 'block';
        } finally {
            loading.style.display = 'none';
        }
    };

    function downloadPDF() {
        const element = document.getElementById('result');
        if (!element.innerHTML.trim() || element.style.display === 'none') {
            alert("Please generate notes first!");
            return;
        }
        const opt = {
            margin:       10,
            filename:     (currentTitle || 'Study_Notes').replace(/\s+/g, '_') + '.pdf',
            image:        { type: 'jpeg', quality: 0.98 },
            html2canvas:  { scale: 2, useCORS: true, backgroundColor: '#ffffff' },
            jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
        };
        html2pdf().set(opt).from(element).save();
    }

    updateClassUI();
</script>
</body>
</html>
